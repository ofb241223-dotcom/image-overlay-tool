name: 构建和发布桌面应用

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: 在 ${{ matrix.os }} 构建
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 检查和测试
        run: |
          python -m compileall merge_logo_gui.py image_overlay_tool tests
          python -m unittest

      - name: 准备应用图标
        run: python packaging/prepare_icons.py

      - name: 打包应用
        run: pyinstaller packaging/image_overlay_tool.spec --noconfirm

      - name: 打包 Linux 产物
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/Image-Overlay-Tool-Linux.zip "Image Overlay Tool"

      - name: 打包 Windows 产物
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path 'dist/Image Overlay Tool' -DestinationPath 'release/Image-Overlay-Tool-Windows.zip' -Force

      - name: 打包 macOS 产物
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --keepParent "dist/Image Overlay Tool.app" release/Image-Overlay-Tool-macOS.zip

      - name: 上传构建附件
        uses: actions/upload-artifact@v4
        with:
          name: 图片叠加工具-${{ matrix.os }}
          path: release/*.zip
          if-no-files-found: error

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      actions: read

    steps:
      - name: 下载构建附件
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 检查 Release 附件
        run: |
          find release-assets -name '*.zip' -type f -print
          count=$(find release-assets -name '*.zip' -type f | wc -l)
          if [ "$count" -lt 3 ]; then
            echo "三平台构建产物不完整，当前只找到 $count 个 zip。"
            exit 1
          fi

      - name: 创建 Release 并上传附件
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: 三平台桌面版构建产物。
          files: release-assets/*.zip
          fail_on_unmatched_files: true
