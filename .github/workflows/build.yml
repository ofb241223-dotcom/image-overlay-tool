name: 构建和发布桌面应用

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: 在 ${{ matrix.os }} 构建
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 检查和测试
        run: |
          python -m compileall merge_logo_gui.py image_overlay_tool tests
          python -m unittest

      - name: 准备应用图标
        run: python packaging/prepare_icons.py

      - name: 打包应用
        run: pyinstaller packaging/image_overlay_tool.spec --noconfirm

      - name: 打包 Linux 产物
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/Image-Overlay-Tool-Linux.zip "Image Overlay Tool"

      - name: 打包 Windows 产物
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path 'dist/Image Overlay Tool' -DestinationPath 'release/Image-Overlay-Tool-Windows.zip' -Force

      - name: 打包 macOS 产物
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --keepParent "dist/Image Overlay Tool.app" release/Image-Overlay-Tool-macOS.zip

      - name: 上传构建附件
        uses: actions/upload-artifact@v4
        with:
          name: 图片叠加工具-${{ matrix.os }}
          path: release/*.zip
          if-no-files-found: error

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: 下载构建附件
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: 创建 Release 并上传附件
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find release-assets -name '*.zip' -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "没有找到可上传的 zip 构建产物。"
            exit 1
          fi
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "三平台桌面版构建产物。"
          fi
          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
